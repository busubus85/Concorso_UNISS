<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Quiz App</h2>

<div class="menu">

    <label for="question-set">Seleziona materia:</label>
    <select id="question-set">
        <option value="1-220">Legge 240</option>
        <option value="221-351">Statuto Uniss</option>
        <option value="352-420">RAFC</option>
        <option value="421-1270">241, ANAC</option>
        <option value="1271-1670">165</option>
        <option value="1671-2000">Contabilità</option>
        <option value="1-2000">TUTTO</option>
    </select>

</div>

<hr>

<div class="container">

    <div id="question-container"></div>

    <div id="answers-container"></div>

    <div id="feedback-container"></div>

    <div id="navigation-container">
        <button onclick="prevQuestion()">⬅ Indietro</button>
        <button onclick="nextQuestion()">Avanti ➡</button>
    </div>

    <div id="nav-bar"></div>

    <hr>

    <div id="counters-container">
        <p>✅ Corrette: <span id="correct-count">0</span></p>
        <p>❌ Sbagliate: <span id="wrong-count">0</span></p>
        <p>🎯 Punteggio: <span id="total-score">0</span></p>
    </div>

    <div id="result-container"></div>

</div>

<script src="script.js"></script>

</body>
</html>
