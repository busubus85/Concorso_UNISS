<!DOCTYPE html>
<html langISS</div><html lang="it">

            <div class="header-text">
                <h1>Tutti Insieme in UNISS</h1>
                <p class="subtitle">Simulatore di quiz per il concorso</p>
            </div>

        </div>

    </header>

    <main>

        <!-- MENU -->
        <section class="menu" id="start-menu">

            <label>Seleziona la materia</label>

            <select id="question-set">
                <option value="1-220">Legge 240</option>
                <option value="221-351">Statuto Uniss</option>
                <option value="352-420">RAFC</option>
                <option value="421-1270">241, ANAC</option>
                <option value="1271-1670">165</option>
                <option value="1671-2000">Contabilità</option>
                <option value="1-2000">TUTTO</option>
            </select>

            <button id="start-button" onclick="startTest()">Inizia il test</button>

        </section>

        <!-- QUIZ -->
        <section id="quiz-area" class="hidden">

            <div id="top-bar">
                <div id="question-progress">Domanda 1/60</div>
                <div id="score-mini">Punteggio: 0</div>
            </div>

            <div id="question-container"></div>
            <div id="answers-container"></div>
            <div id="feedback-container"></div>

            <div id="navigation-container">
                <button onclick="prevQuestion()" class="nav-main-btn">⬅ Indietro</button>
                <button onclick="nextQuestion()" class="nav-main-btn primary">Avanti ➡</button>
            </div>

            <div id="nav-bar"></div>

            <div id="skipped-container"></div>

            <div id="counters-container">
                <p>✅ Corrette: <span id="correct-count">0</span></p>
                <p>❌ Sbagliate: <span id="wrong-count">0</span></p>
                <p>🎯 Punteggio: <span id="total-score">0</span></p>
            </div>

            <div id="result-container"></div>

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
